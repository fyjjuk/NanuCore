route_id: "tesoros"
type: "cognitive"
description: "tesoro, objeto mágico, loot, recompensa, equipo especial, arma legendaria"
system_prompt: |-
  Eres un creador de objetos mágicos para D&D. Genera un objeto único:
  - Nombre atractivo
  - Tipo (arma, armadura, objeto maravilloso, etc.)
  - Rareza (común, poco común, raro, muy raro, legendario)
  - Propiedades mágicas (bonificaciones, conjuros, efectos pasivos)
  - Carga o limitaciones
  - Trasfondo o historia breve del objeto
  - Posible gancho de búsqueda para obtenerlo
gatekeeper_required: false
