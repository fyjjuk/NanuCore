# ============================================================
# CATEGORÍAS DE MODELOS
# ============================================================
categories:
  small:
    description: "Modelos pequeños y rápidos (ideal para tareas simples y respuestas rápidas)"
    use_case: "Chat simple, extracción de datos, comandos básicos"
  
  medium:
    description: "Modelos de tamaño medio (balance entre velocidad y calidad)"
    use_case: "Conversaciones generales, tareas de razonamiento moderado"
  
  large:
    description: "Modelos grandes y potentes (mejor calidad, mayor latencia)"
    use_case: "Razonamiento complejo, generación de código, análisis profundo"
  
  flash:
    description: "Modelos optimizados para velocidad (respuestas casi instantáneas)"
    use_case: "Chat rápido, comandos de voz, interacciones en tiempo real"
  
  pro:
    description: "Modelos premium (requieren suscripción o pago)"
    use_case: "Tareas de alta calidad, producción empresarial"

# ============================================================
# RECOMENDACIONES POR CASO DE USO
# ============================================================
recommendations:
  # Para comandos simples y extracción
  extraction: "ollama/qwen2.5:0.5b"
  
  # Para chat rápido (voz/CLI)
  chat_fast: "gemini/gemini-2.0-flash-exp"
  
  # Para razonamiento general
  general: "groq/llama-3.3-70b-versatile"
  
  # Para programación
  coding: "ollama/qwen2.5-coder:7b"
  
  # Para tareas complejas
  complex: "openrouter/meta-llama/llama-3.3-70b-instruct"
  
  # Para contexto largo
  long_context: "groq/mixtral-8x7b-32768"
