llm:
  gemini:
    api_key: "${GOOGLE_API_KEY}"
  groq:
    api_key: "${GROQ_API_KEY}"

router_mode: "local"

firewall:
  ingress:
    layer1_regex:
      enabled: true
      blacklist_path: "config/ingress_blacklist.txt"
    layer2_semantic:
      enabled: false
  egress:
    default_enabled: true
    blacklist_commands_path: "config/egress_cmd_blacklist.txt"
    blacklist_tools_path: "config/egress_tools_blacklist.txt"

pipeline:
  gatekeeper:
    default_timeout_seconds: 60
    force_for_all_routes: false
