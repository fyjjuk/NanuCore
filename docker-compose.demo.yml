version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ferdonan-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    # Comando para descargar modelos al iniciar (opcional, se puede hacer después)
    # command: >-
    #   sh -c "ollama pull phi3:mini & ollama pull llama3.2:3b & ollama pull phi4-mini && tail -f /dev/null"

  ferdonan:
    build: .
    container_name: ferdonan-app
    ports:
      - "8000:8000"   # Dashboard
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LOG_LEVEL=INFO
    depends_on:
      - ollama
    volumes:
      # Opcional: montar código para desarrollo (comentar en producción)
      - .:/app
    stdin_open: true   # Para entrada interactiva
    tty: true
    # Comando para esperar a que Ollama esté listo y luego ejecutar main.py
    command: >
      sh -c "echo 'Esperando a Ollama...' && 
             while ! curl -s http://ollama:11434/api/tags > /dev/null; do sleep 2; done && 
             echo 'Ollama listo. Ejecutando FerdoNAN...' && 
             python main.py"

volumes:
  ollama_data:
