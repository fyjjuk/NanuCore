route_id: "consultar_bestiario_staged"
type: "cognitive"
description: "consultar bestiario, características de monstruos, dragón, estadísticas"
stages:
  - name: "extraer_info"
    provider: "ollama"
    model: "llama3.2:3b"
    prompt: "Extrae SOLO las estadísticas y características del monstruo mencionado. Sé breve y preciso."
    system_prompt: "Eres un extractor de datos de bestiario. Devuelve solo hechos, sin narrativa."
    output_key: "datos_crudos"
    timeout: 30
  - name: "formatear"
    provider: "ollama"
    model: "llama3.2:3b"
    prompt: "Toma estos datos: {datos_crudos}. Formatea una respuesta amigable para D&D, incluyendo CR, ataques y habilidades especiales."
    system_prompt: "Eres un Dungeon Master que explica estadísticas de monstruos de forma clara y emocionante."
    output_key: "respuesta_final"
    timeout: 30
firewall:
  stages:
    extraer_info:
      semantic_output_filter_enabled: true
    formatear:
      egress_filter_enabled: true
gatekeeper_required: false
