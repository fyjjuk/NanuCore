id: "test_agent"
name: "Test Agent"
description: "Agente de pruebas para verificar el router LLM"
workspace: "workspace/test_agent"
short_term_memory_window: 5
execution_mode: "exclusive"
llm:
  providers:
    - type: "mistral"
      name: "mistral"
      priority: 1                      # Mayor prioridad
      model: "mistral-small-latest"
      temperature: 0.2
      max_tokens: 100
      timeout: 30
    - type: "openrouter"
      name: "openrouter"
      priority: 2                      # Segundo en prioridad
      model: "meta-llama/llama-3.3-70b-instruct"
      temperature: 0.1
      max_tokens: 100
      timeout: 30
    - type: "ollama"
      name: "ollama"
      priority: 3                      # Fallback local
      model: "phi3:mini"
      host: "http://localhost:11434"
      temperature: 0.1
      max_tokens: 50
      timeout: 10
tools:
  native: []
router_config:
  mode: "keyword"
  threshold: 0.05
cache:
  enabled: false
voice:
  enabled: false
