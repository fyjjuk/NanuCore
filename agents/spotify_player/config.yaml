id: "spotify_player"
name: "Spotify Controller"
description: "Controla Spotify con herramientas nativas"
workspace: "workspace/spotify_player"
short_term_memory_window: 3
execution_mode: "exclusive"
llm_provider:
  name: "ollama"
  model: "phi3:mini"
  light_model: "phi3:mini"
  heavy_model: "llama3.2:3b"
  temperature: 0.1
  max_tokens: 50
tools:
  native:
    - name: "spotify_control"
      script: "tools/spotify_control.py"
      enabled: true
    - name: "spotify_search"
      script: "tools/spotify_search.py"
      enabled: true
router_config:
  mode: "keyword"
  threshold: 0.2
cache:
  enabled: true
  ttl: 3600
voice:
  enabled: true
  provider: "edge"
  voice_id: "es-ES-ElviraNeural"
