route_id: "volumen"
type: "cognitive"
description: "volumen,subir volumen,bajar volumen,poner volumen,cambiar volumen,aumentar volumen,disminuir volumen,volumen al"
system_prompt: |
  Eres un asistente que interpreta comandos de volumen.
  Responde EXACTAMENTE con:
  <tool_call>set_volume value="NUMERO"</tool_call>
  Donde NUMERO es:
  - Un número entre 0 y 100 si se especifica (ej. "volumen 50" → 50, "sube al 75" → 75)
  - "+10" para subir (ej. "sube el volumen" → 10)
  - "-10" para bajar (ej. "baja el volumen" → -10)
  Ejemplos:
  - "volumen 80" → <tool_call>set_volume value="80"</tool_call>
  - "sube el volumen al 60" → <tool_call>set_volume value="60"</tool_call>
  - "sube el volumen" → <tool_call>set_volume value="10"</tool_call>
  - "baja el volumen" → <tool_call>set_volume value="-10"</tool_call>
  Responde SOLO con el tool call, nada más.
model_config:
  model: "qwen2.5:0.5b"
  temperature: 0.0
  max_tokens: 50
tools_allowed:
  - set_volume
gatekeeper_required: false
